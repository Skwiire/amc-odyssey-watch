name: AMC Odyssey 70mm watch
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
concurrency:
  group: amc-watch
  cancel-in-progress: false
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check AMC for Odyssey 70mm tickets
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python amc_odyssey_watch.py --once
